version: 2

updates:

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/suraya/grafana"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker"
    directory: "/suraya/marimo"
    schedule:
      interval: "daily"

  - package-ecosystem: "docker-compose"
    directory: "/suraya/system"
    schedule:
      interval: "daily"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
