# Stage OCI container images through GitHub Actions (GHA) to GitHub Container Registry (GHCR).
# The image is available per `ghcr.io/panodata/grafana-suraya-full`.
name: "Release: Grafana OCI"

on:

  # Build images when merging to `main` and when running a release.
  push:
    branches:
      - 'main'
    tags:
      - '*'

  # Build images on each pull request.
  # Remark: Disable to save CI resources. Use workflow_dispatch for manual builds.
  pull_request:

  # Produce a nightly image every day at 6 a.m. CEST.
  schedule:
    - cron: '0 4 * * *'

  # Allow job to be triggered manually.
  workflow_dispatch:
    inputs:
      grafana_version:
        description: 'Grafana version number'
        required: false
        type: string

# Cancel in-progress jobs when pushing to the same branch.
concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

# The name for the produced image at ghcr.io.
env:
  GRAFANA_VERSION: ${{ inputs.grafana_version }}
  IMAGE_NAME: "panodata/grafana-suraya-full"
  RECIPE_PATH: "suraya/grafana"

jobs:
  build_and_test:
    runs-on: "ubuntu-latest"

    steps:
      - name: Acquire sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Build wheel package
        run: |
          pip install build
          python -m build

      - name: Upload wheel package
        uses: actions/upload-artifact@v7
        with:
          name: ${{ runner.os }}-wheel-${{ github.sha }}
          path: dist/*.whl
          retention-days: 7

      - name: Run tests
        run: |
          if [[ -f ${{ env.RECIPE_PATH }}/test.yml ]]; then
            export DOCKER_BUILDKIT=1
            export COMPOSE_DOCKER_CLI_BUILD=1
            docker compose --file ${{ env.RECIPE_PATH }}/test.yml build
            docker compose --file ${{ env.RECIPE_PATH }}/test.yml run sut
          fi

  oci:
    needs: build_and_test
    runs-on: ubuntu-latest

    steps:
      - name: Acquire sources
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Define image name and tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          # List of OCI images to use as base name for tags
          images: |
            ghcr.io/${{ env.IMAGE_NAME }}
          # Generate OCI image tags based on the following events/attributes
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=schedule,pattern=nightly

      - name: Inspect metadata
        run: |
          echo "Tags:      ${{ steps.meta.outputs.tags }}"
          echo "Labels:    ${{ steps.meta.outputs.labels }}"

      - name: Install QEMU
        uses: docker/setup-qemu-action@v4

      - name: Install Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v4

      - name: Inspect builder
        run: |
          echo "Name:      ${{ steps.buildx.outputs.name }}"
          echo "Endpoint:  ${{ steps.buildx.outputs.endpoint }}"
          echo "Status:    ${{ steps.buildx.outputs.status }}"
          echo "Flags:     ${{ steps.buildx.outputs.flags }}"
          echo "Platforms: ${{ steps.buildx.outputs.platforms }}"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          build-contexts: module=${{ env.RECIPE_PATH }}
          file: ${{ env.RECIPE_PATH }}/Dockerfile
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }},${{ inputs.grafana_version }}
          labels: ${{ steps.meta.outputs.labels }}
          push: ${{ ! (startsWith(github.actor, 'dependabot') || github.event.pull_request.head.repo.fork ) }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: mode=max

      - name: Display git status
        run: |
          set -x
          git describe --tags --always
          git status
